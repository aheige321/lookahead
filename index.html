<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lookahead Challenge - 魔方前瞻</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tween.js/18.6.4/tween.umd.js"></script>

    <style>
        body { height: 100dvh; touch-action: none; overflow: hidden; user-select: none; -webkit-user-select: none; }
        ::-webkit-scrollbar { display: none; }
        .move-badge { transition: all 0.2s ease; }
        .move-active { transform: scale(1.15) translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); z-index: 10; }
        .step-btn-active { background-color: #0369a1 !important; color: white !important; border-color: #0369a1 !important; }
        .mode-btn-active { background-color: #0369a1 !important; color: white !important; }
        .demo-btn:active { transform: scale(0.9); }
        @media (hover: hover) { .demo-btn:hover { transform: scale(1.1); z-index: 10; box-shadow: 0 4px 6px rgba(0,0,0,0.2); } }
        
        /* 教程弹窗动画 */
        .tutorial-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 flex flex-col font-sans text-gray-800 relative">

    <!-- 顶部标题与功能区 -->
    <header class="pt-3 pb-2 px-3 sm:px-4 flex justify-between items-center shrink-0 w-full max-w-2xl mx-auto">
        <div>
            <h1 class="text-xl sm:text-2xl font-black text-gray-800 tracking-tight">Lookahead</h1>
            <p class="text-[10px] sm:text-xs text-gray-500 font-bold tracking-wide">硬核空间推理训练</p>
        </div>
        <div class="flex items-center gap-1.5 sm:gap-3">
            <!-- 教程按钮 -->
            <button onclick="showTutorial()" class="flex items-center gap-1 p-1.5 sm:p-2 text-sky-600 font-bold text-xs hover:bg-sky-100 rounded-lg transition-colors" title="玩法教程">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                <span>教程</span>
            </button>
            <button onclick="toggleFullScreen()" class="p-1.5 sm:p-2 text-gray-500 hover:text-gray-800 bg-gray-200 hover:bg-gray-300 rounded-lg transition-colors" title="全屏">
                <svg id="fullscreen-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            </button>
            <div class="bg-gradient-to-r from-blue-500 to-sky-600 text-white px-2 py-1.5 sm:px-3 sm:py-2 rounded-lg shadow flex items-center gap-1">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
                <span id="timer-display" class="text-sm sm:text-base font-mono font-bold tracking-wider">00:00</span>
            </div>
        </div>
    </header>

    <!-- 控制面板 -->
    <div class="px-2 py-2 bg-white shadow-sm flex flex-col items-center justify-center gap-2 z-10 relative shrink-0">
        <div class="grid grid-cols-3 rounded-md overflow-hidden border border-gray-300 w-[95%] max-w-sm">
            <button id="btn-edge" onclick="setMode('edge')" class="py-1.5 text-xs sm:text-sm font-bold bg-white text-gray-700 transition-colors border-r border-gray-300">边块</button>
            <button id="btn-corner" onclick="setMode('corner')" class="py-1.5 text-xs sm:text-sm font-bold bg-white text-gray-700 transition-colors border-r border-gray-300">角块</button>
            <button id="btn-both" onclick="setMode('both')" class="py-1.5 text-xs sm:text-sm font-bold bg-white text-gray-700 transition-colors relative">
                双块 <span class="absolute top-0 right-0 text-[8px] bg-red-500 text-white px-1 rounded-bl">高难</span>
            </button>
        </div>
        <div class="flex items-center gap-1 flex-wrap justify-center max-w-full px-2 mt-1">
            <span class="text-xs font-bold text-gray-400 mr-1">步数:</span>
            <div id="step-buttons" class="flex gap-1"></div>
        </div>
    </div>

    <!-- 主体 3D 区域 -->
    <main class="flex-1 flex flex-col items-center justify-start p-2 relative overflow-hidden">
        <p id="instruction-text" class="absolute top-2 z-10 text-sky-600 text-sm font-bold bg-white/95 px-4 py-1.5 rounded-full shadow-md animate-pulse pointer-events-none transition-colors duration-300">
            👆 滑动可旋转，点击黑块预测
        </p>

        <!-- 画布容器 -->
        <div class="relative w-full max-w-sm sm:max-w-md aspect-square bg-gray-100 rounded-xl shadow-inner border border-gray-200 mt-2 sm:mt-4 overflow-hidden">
            <div id="canvas-container" class="w-full h-full cursor-pointer touch-none"></div>
            
            <div id="result-overlay" class="absolute bottom-3 left-1/2 transform -translate-x-1/2 bg-white/95 shadow-2xl border border-gray-200 rounded-xl p-4 z-20 w-[92%] flex-col items-center transition-all duration-300 opacity-0 pointer-events-none scale-95" style="display: none;">
                <h2 id="result-title" class="text-2xl font-black mb-1 text-center"></h2>
                <p id="result-desc" class="text-xs text-gray-600 text-center mb-1 font-bold"></p>
                <p id="result-time" class="text-sm font-bold text-sky-600 text-center mb-3"></p>
                <div class="flex gap-2 w-full">
                    <button id="btn-retry" onclick="retryGame()" class="flex-1 py-2 bg-gray-100 active:bg-gray-200 text-gray-800 rounded-lg font-bold transition-colors">重试</button>
                    <button onclick="startNewGame()" class="flex-1 py-2 bg-sky-600 active:bg-sky-500 text-white rounded-lg font-bold shadow transition-transform">下一题</button>
                </div>
            </div>
        </div>

        <!-- 底部公式区 & 交互式图例 -->
        <div class="bg-white p-3 sm:p-4 rounded-xl shadow mt-3 w-full max-w-sm sm:max-w-md shrink-0 flex flex-col items-center overflow-y-auto max-h-[38vh]">
            <h2 class="text-xs font-bold text-gray-400 mb-2 uppercase tracking-wide">打乱公式</h2>
            <div id="moves-container" class="flex flex-wrap items-center justify-center gap-1.5 min-h-[40px]"></div>
            
            <div class="mt-4 pt-3 border-t border-gray-100 w-full">
                <p class="text-[11px] sm:text-xs font-bold text-gray-500 mb-1.5 text-center flex items-center justify-center gap-1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
                    看不懂公式？点击下方字母看动画演示
                </p>
                <p class="text-[9px] sm:text-[10px] text-gray-400 mb-3 text-center">
                    (演示结束后魔方会自动还原，不影响作答)
                </p>
                
                <div class="grid grid-cols-2 gap-x-2 gap-y-2 text-[10px] sm:text-xs font-bold text-gray-600">
                    <div class="flex items-center justify-center gap-1.5">
                        <span class="w-7 text-right text-gray-400 mr-1">上黄</span>
                        <button onclick="demoMove('U')" class="demo-btn w-6 h-6 rounded shadow-sm text-black flex items-center justify-center transition-all" style="background-color: #FFD500;">U</button>
                        <button onclick="demoMove('U\'')" class="demo-btn w-6 h-6 rounded shadow-sm text-black flex items-center justify-center transition-all" style="background-color: #FFD500;">U'</button>
                    </div>
                    <div class="flex items-center justify-center gap-1.5">
                        <span class="w-7 text-right text-gray-400 mr-1">下白</span>
                        <button onclick="demoMove('D')" class="demo-btn w-6 h-6 rounded shadow-sm text-black border border-gray-300 flex items-center justify-center transition-all" style="background-color: #FFFFFF;">D</button>
                        <button onclick="demoMove('D\'')" class="demo-btn w-6 h-6 rounded shadow-sm text-black border border-gray-300 flex items-center justify-center transition-all" style="background-color: #FFFFFF;">D'</button>
                    </div>
                    <div class="flex items-center justify-center gap-1.5">
                        <span class="w-7 text-right text-gray-400 mr-1">前蓝</span>
                        <button onclick="demoMove('F')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #0055D4;">F</button>
                        <button onclick="demoMove('F\'')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #0055D4;">F'</button>
                    </div>
                    <div class="flex items-center justify-center gap-1.5">
                        <span class="w-7 text-right text-gray-400 mr-1">后绿</span>
                        <button onclick="demoMove('B')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #00A020;">B</button>
                        <button onclick="demoMove('B\'')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #00A020;">B'</button>
                    </div>
                    <div class="flex items-center justify-center gap-1.5">
                        <span class="w-7 text-right text-gray-400 mr-1">右红</span>
                        <button onclick="demoMove('R')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #D50000;">R</button>
                        <button onclick="demoMove('R\'')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #D50000;">R'</button>
                    </div>
                    <div class="flex items-center justify-center gap-1.5">
                        <span class="w-7 text-right text-gray-400 mr-1">左橙</span>
                        <button onclick="demoMove('L')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #FF6600;">L</button>
                        <button onclick="demoMove('L\'')" class="demo-btn w-6 h-6 rounded shadow-sm text-white flex items-center justify-center transition-all" style="background-color: #FF6600;">L'</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- ========================================== -->
    <!-- 新手教程弹窗 (Overlay) -->
    <!-- ========================================== -->
    <div id="tutorial-overlay" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center hidden" style="backdrop-filter: blur(4px);">
        <div class="bg-white w-11/12 max-w-sm rounded-2xl shadow-2xl overflow-hidden tutorial-fade-in flex flex-col">
            <!-- 图片/动画区 -->
            <div class="bg-sky-50 h-32 flex items-center justify-center relative border-b border-sky-100">
                <div id="tut-icon" class="text-6xl drop-shadow-md transition-transform duration-300">🎯</div>
            </div>
            <!-- 文字区 -->
            <div class="p-5 flex-1 flex flex-col">
                <h3 id="tut-title" class="text-xl font-black text-gray-800 mb-2">欢迎来到前瞻挑战！</h3>
                <p id="tut-desc" class="text-sm text-gray-600 leading-relaxed min-h-[60px]">
                    这是一个专为魔方爱好者设计的硬核空间推理工具。通过大脑模拟魔方转动，提升你的 3D 想象力。
                </p>
                <!-- 进度条 -->
                <div class="flex justify-center gap-2 mt-4 mb-5">
                    <span id="tut-dot-0" class="w-2 h-2 rounded-full bg-sky-500 transition-colors"></span>
                    <span id="tut-dot-1" class="w-2 h-2 rounded-full bg-gray-300 transition-colors"></span>
                    <span id="tut-dot-2" class="w-2 h-2 rounded-full bg-gray-300 transition-colors"></span>
                    <span id="tut-dot-3" class="w-2 h-2 rounded-full bg-gray-300 transition-colors"></span>
                </div>
                <!-- 按钮组 -->
                <div class="flex gap-3 w-full mt-auto">
                    <button id="tut-skip-btn" onclick="closeTutorial()" class="px-4 py-2.5 text-gray-500 font-bold hover:bg-gray-100 rounded-xl transition-colors text-sm">跳过</button>
                    <button id="tut-next-btn" onclick="nextTutorialStep()" class="flex-1 py-2.5 bg-sky-600 active:bg-sky-500 text-white font-bold rounded-xl shadow-md transition-transform active:scale-95">下一步 (Next)</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, controls;
        let cubies = [];
        let pivot;
        
        let initialStartPositions = []; 
        let currentSequence = [];   
        let targetCubies = []; 
        let guessedPositions = []; 
        
        let gameState = 'IDLE'; 
        let gameMode = 'edge';  
        let difficultyCount = 3; 
        let hasInteracted = false; 
        let isDemoing = false;

        let timerInterval = null;
        let startTime = 0;
        let finalTimeStr = "00:00";

        // --- 新手教程状态 ---
        let tutStep = 0;
        const tutContent = [
            { icon: "🎯", title: "第一步：明确目标", desc: "在魔方上，你会看到一个带有<span class='text-green-600 font-bold'>发光边缘的彩色块</span>。请记住它的初始位置，这是你要追踪的目标。" },
            { icon: "🧠", title: "第二步：大脑推演", desc: "看屏幕下方的 <span class='font-bold bg-gray-100 px-1 rounded'>打乱公式</span>。不要动手，纯靠大脑想象：如果按顺序执行这些动作，目标块最终会停在哪里？" },
            { icon: "👆", title: "第三步：提交答案", desc: "滑动屏幕可以全方位转动魔方。确定最终位置后，<span class='font-bold text-sky-600'>点击那个黑色方块</span> 提交你的预测！" },
            { icon: "💡", title: "不懂公式？没关系", desc: "向下滑动，到底部点击字母按钮（如 U、R）。魔方会立刻<span class='font-bold text-orange-500'>播放动画演示</span>，播完自动复原，非常适合新手学习！" }
        ];

        function showTutorial() {
            stopTimer(); // 看教程时暂停计时
            tutStep = 0;
            updateTutorialUI();
            document.getElementById('tutorial-overlay').classList.remove('hidden');
        }

        function nextTutorialStep() {
            if (tutStep < 3) {
                tutStep++;
                updateTutorialUI();
            } else {
                closeTutorial();
            }
        }

        function updateTutorialUI() {
            const data = tutContent[tutStep];
            const iconEl = document.getElementById('tut-icon');
            iconEl.style.transform = 'scale(0.8)';
            setTimeout(() => {
                iconEl.innerText = data.icon;
                iconEl.style.transform = 'scale(1)';
            }, 150);
            
            document.getElementById('tut-title').innerText = data.title;
            document.getElementById('tut-desc').innerHTML = data.desc;
            
            for(let i=0; i<4; i++){
                document.getElementById(`tut-dot-${i}`).className = `w-2 h-2 rounded-full transition-colors ${i === tutStep ? 'bg-sky-500' : 'bg-gray-300'}`;
            }

            const nextBtn = document.getElementById('tut-next-btn');
            if(tutStep === 3) {
                nextBtn.innerText = "开始挑战！(Start)";
                nextBtn.className = "flex-1 py-2.5 bg-green-500 active:bg-green-400 text-white font-bold rounded-xl shadow-md transition-transform active:scale-95";
            } else {
                nextBtn.innerText = "下一步 (Next)";
                nextBtn.className = "flex-1 py-2.5 bg-sky-600 active:bg-sky-500 text-white font-bold rounded-xl shadow-md transition-transform active:scale-95";
            }
        }

        function closeTutorial() {
            document.getElementById('tutorial-overlay').classList.add('hidden');
            localStorage.setItem('lookahead_tutorial_seen', 'true');
            // 如果处于游戏中，恢复计时
            if(gameState === 'PLAYING') {
                startTime = Date.now() - (timerInterval ? 0 : 0); // 简单重置，实际可记录差值
                startTimer();
            }
        }

        // --- 核心常量 ---
        const C_HEX = { U: 0xFFD500, D: 0xFFFFFF, F: 0x0055D4, B: 0x00A020, R: 0xD50000, L: 0xFF6600, BLACK: 0x1A1A1A };
        const C_CSS = { U: '#FFD500', D: '#FFFFFF', F: '#0055D4', B: '#00A020', R: '#D50000', L: '#FF6600' };

        const MOVES_DICT = {
            "U":  { axis: 'y', layer: 1, angle: -Math.PI/2, bg: 'bg-yellow-200', text: 'text-yellow-800' },
            "U'": { axis: 'y', layer: 1, angle: Math.PI/2,  bg: 'bg-yellow-100', text: 'text-yellow-700' },
            "R":  { axis: 'x', layer: 1, angle: -Math.PI/2, bg: 'bg-red-200',    text: 'text-red-800' },
            "R'": { axis: 'x', layer: 1, angle: Math.PI/2,  bg: 'bg-red-100',    text: 'text-red-700' },
            "F":  { axis: 'z', layer: 1, angle: -Math.PI/2, bg: 'bg-blue-200',   text: 'text-blue-800' },
            "F'": { axis: 'z', layer: 1, angle: Math.PI/2,  bg: 'bg-blue-100',   text: 'text-blue-700' },
            "D":  { axis: 'y', layer: -1, angle: Math.PI/2, bg: 'bg-gray-200',   text: 'text-gray-800' },
            "D'": { axis: 'y', layer: -1, angle: -Math.PI/2,bg: 'bg-gray-100',   text: 'text-gray-700' },
            "L":  { axis: 'x', layer: -1, angle: Math.PI/2, bg: 'bg-orange-200', text: 'text-orange-800' },
            "L'": { axis: 'x', layer: -1, angle: -Math.PI/2,bg: 'bg-orange-100', text: 'text-orange-700' },
            "B":  { axis: 'z', layer: -1, angle: Math.PI/2, bg: 'bg-green-200',  text: 'text-green-800' },
            "B'": { axis: 'z', layer: -1, angle: -Math.PI/2,bg: 'bg-green-100',  text: 'text-green-700' }
        };

        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => console.log(err));
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        }
        
        document.addEventListener('fullscreenchange', () => {
            const icon = document.getElementById('fullscreen-icon');
            if(document.fullscreenElement) {
                icon.innerHTML = `<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"></path>`;
            } else {
                icon.innerHTML = `<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path>`;
            }
        });

        function tryAutoFullscreen() {
            if(!hasInteracted && !document.fullscreenElement) {
                hasInteracted = true;
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            startTime = Date.now();
            updateTimerDisplay();
            timerInterval = setInterval(updateTimerDisplay, 1000);
        }
        function stopTimer() { clearInterval(timerInterval); }
        function updateTimerDisplay() {
            const diff = Math.floor((Date.now() - startTime) / 1000);
            const m = String(Math.floor(diff / 60)).padStart(2, '0');
            const s = String(diff % 60).padStart(2, '0');
            finalTimeStr = `${m}:${s}`;
            document.getElementById('timer-display').innerText = finalTimeStr;
        }

        function createCenterTexture(letter, bgColorCSS) {
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = bgColorCSS;
            ctx.fillRect(0, 0, 128, 128);
            ctx.font = 'bold 75px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 6;
            ctx.strokeText(letter, 64, 70);
            ctx.fillStyle = '#000000';
            ctx.fillText(letter, 64, 70);
            const tex = new THREE.CanvasTexture(canvas);
            tex.anisotropy = 16;
            return tex;
        }

        function init() {
            const container = document.getElementById('canvas-container');
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0xf3f4f6, 1); 
            container.appendChild(renderer.domElement);

            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(42, container.clientWidth / container.clientHeight, 0.1, 100);
            camera.position.set(4.5, 3.8, 5.5);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enablePan = false;
            controls.enableZoom = false;
            controls.enableDamping = true;
            controls.dampingFactor = 0.1;

            scene.add(new THREE.AmbientLight(0xffffff, 0.85));
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.65);
            dirLight.position.set(10, 15, 15);
            scene.add(dirLight);

            pivot = new THREE.Object3D();
            scene.add(pivot);

            window.addEventListener('resize', onWindowResize);
            bindInteraction();

            renderStepButtons(); 
            setMode('edge'); 
            animate();

            // 检查是否需要弹新手教程
            if(!localStorage.getItem('lookahead_tutorial_seen')) {
                showTutorial();
            }
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let pointerDownPos = null;
        let isDragging = false;

        function bindInteraction() {
            const dom = renderer.domElement;
            dom.addEventListener('pointerdown', (e) => {
                if (gameState !== 'PLAYING' || isDemoing || !document.getElementById('tutorial-overlay').classList.contains('hidden')) return;
                tryAutoFullscreen(); 
                isDragging = false;
                pointerDownPos = { x: e.clientX, y: e.clientY };
            });
            dom.addEventListener('pointermove', (e) => {
                if (!pointerDownPos) return;
                const dist = Math.hypot(e.clientX - pointerDownPos.x, e.clientY - pointerDownPos.y);
                if (dist > 5) isDragging = true;
            });
            dom.addEventListener('pointerup', (e) => {
                if (gameState !== 'PLAYING' || !pointerDownPos || isDemoing) return;
                if (!isDragging) {
                    const rect = dom.getBoundingClientRect();
                    mouse.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
                    mouse.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
                    raycaster.setFromCamera(mouse, camera);
                    const intersects = raycaster.intersectObjects(cubies);
                    if (intersects.length > 0) {
                        const clickedCubie = intersects[0].object;
                        if(!clickedCubie.userData.isCenter) {
                            handlePieceClick(clickedCubie);
                        }
                    }
                }
                pointerDownPos = null;
            });
            dom.addEventListener('pointerleave', () => { pointerDownPos = null; });
        }

        function createCube(targetPosArray) {
            cubies.forEach(c => {
                scene.remove(c);
                if(c.geometry) c.geometry.dispose();
                if(c.material) {
                    c.material.forEach(m => {
                        if (m && m.map) m.map.dispose();
                        if (m) m.dispose();
                    });
                }
            });
            cubies = [];
            targetCubies = []; 
            
            const geometry = new THREE.BoxGeometry(0.96, 0.96, 0.96);
            const edgesGeometry = new THREE.EdgesGeometry(geometry);
            const edgesMaterial = new THREE.LineBasicMaterial({ color: 0x444444, linewidth: 1 }); 

            const createMat = (colorHex) => new THREE.MeshStandardMaterial({ 
                color: colorHex, roughness: 0.5, metalness: 0.1 
            });

            for (let x = -1; x <= 1; x++) {
                for (let y = -1; y <= 1; y++) {
                    for (let z = -1; z <= 1; z++) {
                        const isCenter = (Math.abs(x) + Math.abs(y) + Math.abs(z) === 1);
                        
                        let targetIndex = -1;
                        if (targetPosArray && targetPosArray.length > 0) {
                            for(let i=0; i<targetPosArray.length; i++){
                                if(targetPosArray[i].x === x && targetPosArray[i].y === y && targetPosArray[i].z === z) {
                                    targetIndex = i; break;
                                }
                            }
                        }
                        const isTarget = targetIndex !== -1;

                        const materials = Array(6).fill(null).map(() => createMat(C_HEX.BLACK));

                        if (isCenter) {
                            if (x === 1) materials[0] = new THREE.MeshStandardMaterial({ map: createCenterTexture('R', C_CSS.R), roughness: 0.5 });
                            if (x === -1) materials[1] = new THREE.MeshStandardMaterial({ map: createCenterTexture('L', C_CSS.L), roughness: 0.5 });
                            if (y === 1) materials[2] = new THREE.MeshStandardMaterial({ map: createCenterTexture('U', C_CSS.U), roughness: 0.5 });
                            if (y === -1) materials[3] = new THREE.MeshStandardMaterial({ map: createCenterTexture('D', C_CSS.D), roughness: 0.5 });
                            if (z === 1) materials[4] = new THREE.MeshStandardMaterial({ map: createCenterTexture('F', C_CSS.F), roughness: 0.5 });
                            if (z === -1) materials[5] = new THREE.MeshStandardMaterial({ map: createCenterTexture('B', C_CSS.B), roughness: 0.5 });
                        }

                        if (isTarget) {
                            if (x === 1) materials[0] = createMat(C_HEX.R);
                            if (x === -1) materials[1] = createMat(C_HEX.L);
                            if (y === 1) materials[2] = createMat(C_HEX.U);
                            if (y === -1) materials[3] = createMat(C_HEX.D);
                            if (z === 1) materials[4] = createMat(C_HEX.F);
                            if (z === -1) materials[5] = createMat(C_HEX.B);
                        }

                        const mesh = new THREE.Mesh(geometry, materials);
                        mesh.position.set(x, y, z);
                        mesh.userData = { isCenter, isTarget, targetIndex };
                        
                        const line = new THREE.LineSegments(edgesGeometry, edgesMaterial);
                        mesh.add(line);
                        
                        scene.add(mesh);
                        cubies.push(mesh);
                        
                        if(isTarget) {
                            targetCubies[targetIndex] = mesh;
                            const hlColor = targetIndex === 0 ? 0x00ff00 : 0xff00ff;
                            addHighlight(mesh, hlColor, `target-hl-${targetIndex}`, 1.04);
                        }
                    }
                }
            }
        }

        async function demoMove(moveStr) {
            if (gameState !== 'PLAYING' || isDemoing) return;
            
            isDemoing = true;
            tryAutoFullscreen();

            const ins = document.getElementById('instruction-text');
            const originalHTML = ins.innerHTML;
            const originalClass = ins.className;
            ins.className = "absolute top-2 z-10 text-orange-600 text-sm font-bold bg-orange-50 px-4 py-1.5 rounded-full shadow-md border border-orange-200 pointer-events-none";
            ins.innerText = `👀 正在演示动作: [ ${moveStr} ]`;

            const moveDef = MOVES_DICT[moveStr];
            let reverseMoveStr = moveStr.endsWith("'") ? moveStr[0] : moveStr + "'";
            const reverseDef = MOVES_DICT[reverseMoveStr];

            await animateLayer(moveDef, 300);
            await new Promise(r => setTimeout(r, 400));
            
            ins.innerText = `🔄 演示结束，自动复原...`;
            await animateLayer(reverseDef, 300);

            ins.className = originalClass;
            ins.innerHTML = originalHTML;
            isDemoing = false;
        }


        function setMode(mode) {
            if (isDemoing) return;
            tryAutoFullscreen();
            gameMode = mode;
            document.getElementById('btn-edge').className = `py-1.5 text-xs sm:text-sm font-bold transition-colors border-r border-gray-300 ${mode === 'edge' ? 'mode-btn-active' : 'bg-white text-gray-700'}`;
            document.getElementById('btn-corner').className = `py-1.5 text-xs sm:text-sm font-bold transition-colors border-r border-gray-300 ${mode === 'corner' ? 'mode-btn-active' : 'bg-white text-gray-700'}`;
            document.getElementById('btn-both').className = `py-1.5 text-xs sm:text-sm font-bold transition-colors relative ${mode === 'both' ? 'mode-btn-active' : 'bg-white text-gray-700'}`;
            startNewGame();
        }

        function setDifficulty(n) {
            if (isDemoing) return;
            tryAutoFullscreen();
            difficultyCount = n;
            renderStepButtons(); 
            startNewGame();
        }

        function renderStepButtons() {
            const container = document.getElementById('step-buttons');
            container.innerHTML = '';
            for(let i = 1; i <= 8; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `w-7 h-7 sm:w-8 sm:h-8 rounded text-xs sm:text-sm font-bold border border-gray-300 transition-colors ${i === difficultyCount ? 'step-btn-active' : 'bg-white text-gray-700'}`;
                btn.onclick = () => setDifficulty(i);
                container.appendChild(btn);
            }
        }

        function startNewGame() {
            initialStartPositions = [];
            const edgePosList = [{x: 0, y: 1, z: 1}, {x: 0, y: -1, z: 1}, {x: 1, y: 0, z: 1}, {x: -1, y: 0, z: 1}];
            const cornerPosList = [{x: 1, y: 1, z: 1}, {x: -1, y: 1, z: 1}, {x: 1, y: -1, z: 1}, {x: -1, y: -1, z: 1}];

            if (gameMode === 'edge') {
                initialStartPositions.push(edgePosList[Math.floor(Math.random() * edgePosList.length)]);
            } else if (gameMode === 'corner') {
                initialStartPositions.push(cornerPosList[Math.floor(Math.random() * cornerPosList.length)]);
            } else if (gameMode === 'both') {
                initialStartPositions.push(edgePosList[Math.floor(Math.random() * edgePosList.length)]);
                initialStartPositions.push(cornerPosList[Math.floor(Math.random() * cornerPosList.length)]);
            }
            
            const possibleMoves = ["U", "U'", "R", "R'", "F", "F'", "L", "L'"];
            currentSequence = [];
            let lastMove = "";
            for(let i=0; i<difficultyCount; i++) {
                let m;
                do { m = possibleMoves[Math.floor(Math.random() * possibleMoves.length)]; } 
                while (m[0] === lastMove[0]);
                currentSequence.push(m);
                lastMove = m;
            }
            
            setupPuzzleState(); 
        }

        function retryGame() { setupPuzzleState(); }

        function setupPuzzleState() {
            gameState = 'PLAYING';
            guessedPositions = []; 
            hideResultCard();
            updateInstructionUI();
            
            createCube(initialStartPositions);
            controls.reset();
            camera.position.set(4.5, 3.8, 5.5);
            
            renderMoveBadges();
            
            // 如果没在显示教程，直接开始计时
            if(document.getElementById('tutorial-overlay').classList.contains('hidden')) {
                startTimer(); 
            }
        }

        function updateInstructionUI() {
            const ins = document.getElementById('instruction-text');
            if (gameMode !== 'both') {
                ins.className = "absolute top-2 z-10 text-sky-600 text-sm font-bold bg-white/95 px-4 py-1.5 rounded-full shadow-md animate-pulse pointer-events-none transition-colors duration-300";
                ins.innerText = "👆 滑动旋转，点击黑块预测最终位置";
            } else {
                if (guessedPositions.length === 0) {
                    ins.className = "absolute top-2 z-10 text-green-600 text-sm font-bold bg-green-50 px-4 py-1.5 rounded-full shadow-md border border-green-200 animate-pulse pointer-events-none transition-colors duration-300";
                    ins.innerHTML = "1/2 步：预测 <span class='bg-green-500 text-white px-1 rounded'>绿色边块</span> 的位置";
                } else if (guessedPositions.length === 1) {
                    ins.className = "absolute top-2 z-10 text-purple-600 text-sm font-bold bg-purple-50 px-4 py-1.5 rounded-full shadow-md border border-purple-200 animate-pulse pointer-events-none transition-colors duration-300";
                    ins.innerHTML = "2/2 步：预测 <span class='bg-purple-500 text-white px-1 rounded'>紫色角块</span> 的位置";
                }
            }
        }

        function renderMoveBadges() {
            const container = document.getElementById('moves-container');
            container.innerHTML = '';
            currentSequence.forEach((move, idx) => {
                const conf = MOVES_DICT[move];
                const el = document.createElement('div');
                el.id = `move-badge-${idx}`;
                el.className = `move-badge px-2 py-1 sm:px-3 sm:py-1.5 border rounded bg-white font-mono text-base sm:text-lg font-bold ${conf.bg} ${conf.text}`;
                el.innerText = move;
                container.appendChild(el);
            });
        }

        function addHighlight(mesh, hexColor, name, scale = 1.02) {
            removeHighlight(mesh, name);
            const edges = new THREE.EdgesGeometry(new THREE.BoxGeometry(scale, scale, scale));
            const material = new THREE.LineBasicMaterial({ color: hexColor, linewidth: 3 });
            const line = new THREE.LineSegments(edges, material);
            line.name = name;
            mesh.add(line);
        }

        function removeHighlight(mesh, name) {
            const existing = mesh.getObjectByName(name);
            if (existing) {
                mesh.remove(existing);
                existing.geometry.dispose();
                existing.material.dispose();
            }
        }

        function handlePieceClick(clickedCubie) {
            const currentGuessIndex = guessedPositions.length;
            guessedPositions.push(new THREE.Vector3().copy(clickedCubie.position).round());

            if (gameMode !== 'both') {
                addHighlight(clickedCubie, 0xff0000, 'guess-hl-0', 1.05);
                triggerVerification();
            } else {
                if (currentGuessIndex === 0) {
                    addHighlight(clickedCubie, 0xff0000, 'guess-hl-0', 1.05); 
                    updateInstructionUI();
                } else if (currentGuessIndex === 1) {
                    addHighlight(clickedCubie, 0x00aaff, 'guess-hl-1', 1.05); 
                    triggerVerification();
                }
            }
        }

        function triggerVerification() {
            gameState = 'VERIFYING';
            stopTimer(); 
            const ins = document.getElementById('instruction-text');
            ins.className = "absolute top-2 z-10 text-gray-700 text-sm font-bold bg-white/95 px-4 py-1.5 rounded-full shadow-md pointer-events-none";
            ins.innerText = "👀 验证中，请看动画...";
            setTimeout(playVerificationAnimation, 400);
        }

        async function playVerificationAnimation() {
            for (let i = 0; i < currentSequence.length; i++) {
                document.querySelectorAll('.move-badge').forEach(b => b.classList.remove('move-active'));
                const badge = document.getElementById(`move-badge-${i}`);
                if(badge) badge.classList.add('move-active');
                await animateLayer(MOVES_DICT[currentSequence[i]], 300);
            }
            document.querySelectorAll('.move-badge').forEach(b => b.classList.remove('move-active'));
            setTimeout(checkWin, 200);
        }

        function animateLayer(moveDef, duration) {
            return new Promise(resolve => {
                const groupToMove = cubies.filter(c => Math.round(c.position[moveDef.axis]) === moveDef.layer);
                pivot.rotation.set(0, 0, 0);
                pivot.updateMatrixWorld();
                groupToMove.forEach(c => pivot.attach(c));

                const targetRotation = { value: 0 };
                new TWEEN.Tween(targetRotation)
                    .to({ value: moveDef.angle }, duration)
                    .easing(TWEEN.Easing.Quadratic.InOut)
                    .onUpdate(() => { pivot.rotation[moveDef.axis] = targetRotation.value; })
                    .onComplete(() => {
                        pivot.updateMatrixWorld();
                        groupToMove.forEach(c => {
                            scene.attach(c);
                            c.position.x = Math.round(c.position.x);
                            c.position.y = Math.round(c.position.y);
                            c.position.z = Math.round(c.position.z);
                            c.rotation.x = Math.round(c.rotation.x / (Math.PI/2)) * (Math.PI/2);
                            c.rotation.y = Math.round(c.rotation.y / (Math.PI/2)) * (Math.PI/2);
                            c.rotation.z = Math.round(c.rotation.z / (Math.PI/2)) * (Math.PI/2);
                        });
                        resolve();
                    })
                    .start();
            });
        }

        function checkWin() {
            gameState = 'END';
            document.getElementById('instruction-text').innerText = "可自由拖动魔方复盘。";
            
            const finalPos1 = new THREE.Vector3().copy(targetCubies[0].position).round();
            const isCorrect1 = finalPos1.equals(guessedPositions[0]);
            
            let isCorrect2 = true;
            if (gameMode === 'both') {
                const finalPos2 = new THREE.Vector3().copy(targetCubies[1].position).round();
                isCorrect2 = finalPos2.equals(guessedPositions[1]);
            }

            showResultCard(isCorrect1, isCorrect2);
        }

        function showResultCard(isCorrect1, isCorrect2) {
            const overlay = document.getElementById('result-overlay');
            const title = document.getElementById('result-title');
            const desc = document.getElementById('result-desc');
            const timeUI = document.getElementById('result-time');
            const btnRetry = document.getElementById('btn-retry');

            overlay.style.display = 'flex';
            setTimeout(() => {
                overlay.classList.remove('opacity-0', 'scale-95', 'pointer-events-none');
                overlay.classList.add('opacity-100', 'scale-100', 'pointer-events-auto');
            }, 10);

            timeUI.innerText = `⏱ 耗时：${finalTimeStr}`;

            if (gameMode !== 'both') {
                if (isCorrect1) {
                    title.innerHTML = "🎉 回答正确";
                    title.className = "text-2xl font-black mb-1 text-center text-green-500";
                    desc.innerText = "干得漂亮！空间推理完全准确。";
                    btnRetry.style.display = 'none'; 
                } else {
                    title.innerHTML = "❌ 猜错了";
                    title.className = "text-2xl font-black mb-1 text-center text-red-500";
                    desc.innerText = "目标块没有停在红框内。拖动复盘或重试。";
                    btnRetry.style.display = 'block'; 
                }
            } else {
                if (isCorrect1 && isCorrect2) {
                    title.innerHTML = "🏆 完美过关";
                    title.className = "text-2xl font-black mb-1 text-center text-yellow-500 drop-shadow";
                    desc.innerText = "太强了！双块追踪完全准确！";
                    btnRetry.style.display = 'none'; 
                } else if (isCorrect1 || isCorrect2) {
                    title.innerHTML = "😅 差一点点";
                    title.className = "text-2xl font-black mb-1 text-center text-orange-500";
                    if(isCorrect1) desc.innerText = "绿色边块猜对了，但紫色角块猜错了。";
                    if(isCorrect2) desc.innerText = "紫色角块猜对了，但绿色边块猜错了。";
                    btnRetry.style.display = 'block'; 
                } else {
                    title.innerHTML = "💥 全军覆没";
                    title.className = "text-2xl font-black mb-1 text-center text-red-600";
                    desc.innerText = "两个块都没追踪对。拖动复盘或重试！";
                    btnRetry.style.display = 'block'; 
                }
            }
        }

        function hideResultCard() {
            const overlay = document.getElementById('result-overlay');
            overlay.classList.remove('opacity-100', 'scale-100', 'pointer-events-auto');
            overlay.classList.add('opacity-0', 'scale-95', 'pointer-events-none');
            setTimeout(() => { overlay.style.display = 'none'; }, 300);
        }

        function onWindowResize() {
            const container = document.getElementById('canvas-container');
            if(container.clientWidth === 0) return;
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);
            TWEEN.update(time);
            controls.update();
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
